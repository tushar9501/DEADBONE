<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deadbone Logo in Navbar</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Import Poppins font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <!-- Added tabindex for accessibility -->
        <div class="logo-container" id="logoContainer" tabindex="0">
          <span class="bracket" style="--delay: 0.1s">{</span>
          <span class="letter" style="--delay: 0.2s">d</span>
          <span class="letter" style="--delay: 0.3s">e</span>
          <span class="letter" style="--delay: 0.4s">a</span>
          <span class="letter" style="--delay: 0.5s">d</span>
          <span class="letter" style="--delay: 0.6s">b</span>
          <span class="letter" style="--delay: 0.7s">o</span>
          <span class="last-two">
            <span class="letter" style="--delay: 0.8s">n</span>
            <span class="letter" style="--delay: 0.9s">e</span>
            <small class="domain">.com</small>
          </span>
          <span class="bracket" style="--delay: 1s">}</span>
        </div>
      </div>
    </nav>
    <div class="content">
      <p>Page content goes here.</p>
    </div>
    <!-- No JavaScript is required for the animations -->
  </body>
</html>
